<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" width="520" height="80" role="img" aria-label="Fabricate logo">
  <defs>
    <linearGradient id="grad-icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a74ff"/>
      <stop offset="100%" stop-color="#00d9a4"/>
    </linearGradient>
    <linearGradient id="grad-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a74ff"/>
      <stop offset="100%" stop-color="#19b7ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon mark: three stacked "layers" suggesting fabrication / stacking -->
  <g filter="url(#glow)">
    <!-- bottom layer -->
    <rect x="6" y="46" width="52" height="10" rx="3" fill="url(#grad-icon)" opacity="0.4"/>
    <!-- mid layer -->
    <rect x="11" y="33" width="42" height="10" rx="3" fill="url(#grad-icon)" opacity="0.7"/>
    <!-- top layer -->
    <rect x="16" y="20" width="32" height="10" rx="3" fill="url(#grad-icon)"/>
    <!-- small connector dot -->
    <circle cx="32" cy="15" r="4" fill="#00d9a4"/>
  </g>

  <!-- Wordmark -->
  <text
    x="80" y="52"
    font-family="'Space Grotesk', 'Avenir Next', 'Segoe UI', sans-serif"
    font-size="34"
    font-weight="700"
    letter-spacing="-0.03em"
    fill="url(#grad-text)"
  >Fabricate</text>

  <!-- Tagline -->
  <text
    x="81" y="67"
    font-family="'Space Grotesk', 'Avenir Next', 'Segoe UI', sans-serif"
    font-size="11"
    font-weight="500"
    letter-spacing="0.08em"
    fill="#4d6484"
    text-transform="uppercase"
  >Fabricate your backend. Ship your frontend.</text>
</svg>
